<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f11;--bg2:#17171a;--bg3:#1e1e22;--bg4:#26262c;
  --border:#2a2a32;--border2:#38383f;
  --text:#eeeef2;--text2:#8888a0;--text3:#4a4a60;
  --accent:#6c63ff;--accent2:#9d97ff;--accent-bg:rgba(108,99,255,0.1);
  --green:#3ecf8e;--green-bg:rgba(62,207,142,0.08);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,0.08);
  --red:#f87171;--red-bg:rgba(248,113,113,0.08);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,0.08);
  --r:10px;--rl:14px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{width:340px;padding:2.5rem;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl)}
.login-logo{text-align:center;margin-bottom:2rem}
.logo-mark{width:48px;height:48px;border-radius:14px;background:var(--accent);display:inline-flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;margin-bottom:12px}
.login-logo h1{font-size:17px;font-weight:600}
.login-logo p{font-size:12px;color:var(--text2);margin-top:3px}
.fgroup{margin-bottom:13px}
.fgroup label{display:block;font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:0.04em}
.fgroup input{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:13px;font-family:var(--font);transition:border-color 0.15s}
.fgroup input:focus{outline:none;border-color:var(--accent)}
.btn-login{width:100%;padding:10px;background:var(--accent);border:none;border-radius:var(--r);color:#fff;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;margin-top:4px;transition:opacity 0.15s}
.btn-login:hover{opacity:0.85}
.login-err{font-size:12px;color:var(--red);text-align:center;margin-top:10px;min-height:16px}

/* APP */
#app-screen{display:none;min-height:100vh;flex-direction:column}
.topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;position:sticky;top:0;z-index:100}
.topbar-logo{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.topbar-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.topbar-spacer{flex:1}
.role-pill{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;background:var(--accent-bg);color:var(--accent2)}
.user-av{width:28px;height:28px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--accent2);border:1px solid var(--border2)}
.btn-logout{padding:5px 12px;background:transparent;border:1px solid var(--border);border-radius:var(--r);color:var(--text2);font-size:12px;cursor:pointer;font-family:var(--font);transition:all 0.15s}
.btn-logout:hover{color:var(--text);border-color:var(--border2)}
.layout{display:flex;flex:1;min-height:calc(100vh - 52px)}

/* SIDEBAR */
.sidebar{width:196px;background:var(--bg2);border-right:1px solid var(--border);padding:14px 10px;flex-shrink:0}
.sidebar-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;padding:8px 10px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--r);color:var(--text2);font-size:13px;background:transparent;border:none;width:100%;text-align:left;cursor:pointer;transition:all 0.12s;font-family:var(--font)}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent2);font-weight:500}
.nav-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* CONTENT */
.content{flex:1;padding:24px;overflow-y:auto;background:var(--bg)}
.page{display:none}.page.visible{display:block}
.page-title{font-size:20px;font-weight:600;margin-bottom:3px}
.page-sub{font-size:12px;color:var(--text2);margin-bottom:20px}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px 20px;margin-bottom:14px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:13px;font-weight:600}

/* METRICS */
.metrics{display:grid;gap:10px;margin-bottom:16px}
.m4{grid-template-columns:repeat(4,minmax(0,1fr))}
.m3{grid-template-columns:repeat(3,minmax(0,1fr))}
.m2{grid-template-columns:repeat(2,minmax(0,1fr))}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px}
.mc-label{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500}
.mc-value{font-size:22px;font-weight:600;font-family:var(--mono)}
.mc-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 10px;color:var(--text2);font-weight:500;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:0.04em;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--bg3)}

/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.bg{background:var(--green-bg);color:var(--green)}
.ba{background:var(--amber-bg);color:var(--amber)}
.br{background:var(--red-bg);color:var(--red)}
.bi{background:var(--blue-bg);color:var(--blue)}
.bv{background:var(--accent-bg);color:var(--accent2)}

/* AVATAR */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0}
.av-sm{width:26px;height:26px;font-size:10px}
.av-md{width:36px;height:36px;font-size:13px}
.c1{background:#1e2a3a;color:var(--blue)}
.c2{background:#1a2a1e;color:var(--green)}
.c3{background:#261e2a;color:#c084fc}
.c4{background:#2a2218;color:var(--amber)}
.c5{background:#2a1e1e;color:var(--red)}

/* BUTTONS */
.btn{padding:6px 14px;border-radius:var(--r);font-size:12px;font-weight:500;font-family:var(--font);border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all 0.12s}
.btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.btn-a{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-a:hover{opacity:0.85;color:#fff}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-d{border-color:transparent;color:var(--red)}
.btn-d:hover{background:var(--red-bg);border-color:transparent}

/* FORM */
.fg{display:grid;gap:10px;margin-bottom:14px}
.fg2{grid-template-columns:1fr 1fr}
.ff{display:flex;flex-direction:column;gap:5px}
.fl{font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:0.04em}
input,select,textarea{width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:13px;font-family:var(--font);transition:border-color 0.15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
select option{background:var(--bg3)}
textarea{resize:vertical;min-height:64px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}

/* COUNTER */
.ctr-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
.ctr-ctrl{display:flex;align-items:center;gap:10px}
.ctr-btn{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.12s;font-weight:300;font-family:var(--font)}
.ctr-btn:hover{border-color:var(--accent);color:var(--accent)}
.ctr-val{font-size:18px;font-weight:600;min-width:28px;text-align:center;font-family:var(--mono)}
.cv-ok{color:var(--green)}.cv-warn{color:var(--amber)}.cv-danger{color:var(--red)}

/* PROGRESS */
.pb-wrap{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:3px}
.pb{height:100%;border-radius:2px;background:var(--accent)}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;align-items:center;justify-content:center}
.mo.visible{display:flex}
.mo-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:24px;width:460px;max-width:94vw}
.mo-title{font-size:15px;font-weight:600;margin-bottom:18px}

/* COND */
.cbox{border-radius:var(--r);padding:10px 14px;margin-bottom:8px;font-size:12px;border:1px solid transparent}
.cg{background:var(--green-bg);border-color:rgba(62,207,142,0.15);color:var(--green)}
.ca{background:var(--amber-bg);border-color:rgba(245,158,11,0.15);color:var(--amber)}
.cr{background:var(--red-bg);border-color:rgba(248,113,113,0.15);color:var(--red)}
.cbox-title{font-weight:600;margin-bottom:2px}
.cbox-desc{font-size:11px;opacity:0.8}
.acond{border-radius:var(--r);padding:10px 14px;font-size:13px;font-weight:500;margin-bottom:14px;border:1px solid}
.acg{background:var(--green-bg);border-color:rgba(62,207,142,0.25);color:var(--green)}
.aca{background:var(--amber-bg);border-color:rgba(245,158,11,0.25);color:var(--amber)}
.acr{background:var(--red-bg);border-color:rgba(248,113,113,0.25);color:var(--red)}

/* RESULT */
.rbox{background:var(--bg3);border-radius:var(--r);padding:14px}
.rrow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;gap:8px}
.rrow:last-child{border-bottom:none}
.rtotal{display:flex;justify-content:space-between;align-items:center;padding:10px 0 0;font-size:15px;font-weight:600;border-top:1px solid var(--border2);margin-top:4px}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border)}
.tab{padding:7px 14px;background:transparent;border:none;color:var(--text2);font-size:13px;font-family:var(--font);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.12s;font-weight:500}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent)}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}

/* VEND CARD */
.vc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px}
.vc-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.vc-name{font-size:13px;font-weight:500}
.vc-sub{font-size:11px;color:var(--text2)}
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:16px}

/* PLAN GRID */
.pgrid{display:grid;grid-template-columns:1fr 60px 60px;gap:6px;align-items:center;margin-bottom:4px}

/* SUMMARY */
.sbox{background:var(--bg3);border-radius:var(--r);padding:10px 14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0}
.si{display:flex;flex-direction:column;gap:2px}
.sv{font-size:14px;font-weight:600;font-family:var(--mono)}
.sl{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:0.04em}

/* UPLOAD */
.upzone{border:1px dashed var(--border2);border-radius:var(--rl);padding:2rem;text-align:center;cursor:pointer;transition:all 0.15s}
.upzone:hover{border-color:var(--accent);background:var(--accent-bg)}
.up-icon{font-size:28px;margin-bottom:8px;opacity:0.4}
.up-label{font-size:13px;color:var(--text2);font-weight:500}
.up-sub{font-size:11px;color:var(--text3);margin-top:4px}

.empty{text-align:center;padding:2rem;color:var(--text3);font-size:13px}
.slabel{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px}
.no{color:var(--text3)}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;font-size:13px;color:var(--text2)}
#toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:10px 16px;font-size:12px;z-index:999;opacity:0;transform:translateY(8px);transition:all 0.2s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
@media(max-width:700px){.sidebar{display:none}.m4{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}.fg2{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="loading">Iniciando...</div>
<div id="toast"></div>

<div id="login-screen" style="display:none">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-mark">P</div>
      <h1>Personal App</h1>
      <p>Gestión de equipo y comisiones</p>
    </div>
    <div class="fgroup"><label>Usuario</label><input type="text" id="li-user" placeholder="usuario" autocomplete="username"></div>
    <div class="fgroup"><label>Contraseña</label><input type="password" id="li-pass" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn-login" onclick="doLogin()">Ingresar</button>
    <div class="login-err" id="li-err"></div>
  </div>
</div>

<div id="app-screen">
  <div class="topbar">
    <div class="topbar-logo"><div class="topbar-dot"></div>Personal App</div>
    <div class="topbar-spacer"></div>
    <span class="role-pill" id="top-role"></span>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="user-av" id="top-av"></div>
      <span style="font-size:12px;color:var(--text2)" id="top-name"></span>
    </div>
    <button class="btn-logout" onclick="doLogout()">Salir</button>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content">
      <div class="page" id="pg-dashboard"></div>
      <div class="page" id="pg-equipo"></div>
      <div class="page" id="pg-ventas"></div>
      <div class="page" id="pg-comisiones"></div>
      <div class="page" id="pg-simulador"></div>
      <div class="page" id="pg-faltas"></div>
      <div class="page" id="pg-horas"></div>
      <div class="page" id="pg-legajos"></div>
      <div class="page" id="pg-config"></div>
      <div class="page" id="pg-rrhh"></div>
      <div class="page" id="pg-personal"></div>
      <div class="page" id="pg-asistencia"></div>
      <div class="page" id="pg-importar"></div>
    </div>
  </div>
</div>

<!-- MODAL FALTA -->
<div class="mo" id="mo-falta">
  <div class="mo-box">
    <div class="mo-title">Registrar falta</div>
    <div class="fg fg2">
      <div class="ff"><span class="fl">Empleado</span><select id="mf-emp"></select></div>
      <div class="ff"><span class="fl">Fecha</span><input type="date" id="mf-fecha"></div>
      <div class="ff"><span class="fl">Tipo</span>
        <select id="mf-tipo">
          <option value="injustificada">Injustificada</option>
          <option value="justificada">Justificada</option>
          <option value="medica">Médica</option>
          <option value="licencia">Licencia</option>
        </select>
      </div>
      <div class="ff"><span class="fl">Registrado por</span>
        <select id="mf-reg"><option value="supervisor">Supervisor</option><option value="rrhh">RRHH</option></select>
      </div>
    </div>
    <div class="ff" style="margin-bottom:16px"><span class="fl">Observación</span><textarea id="mf-obs" placeholder="opcional..."></textarea></div>
    <div class="form-actions">
      <button class="btn" onclick="closeMo('mo-falta')">Cancelar</button>
      <button class="btn btn-a" onclick="guardarFalta()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL EMPLEADO -->
<div class="mo" id="mo-emp">
  <div class="mo-box">
    <div class="mo-title" id="mo-emp-title">Nuevo empleado</div>
    <div class="fg fg2">
      <div class="ff" style="grid-column:1/-1"><span class="fl">Nombre completo</span><input type="text" id="me-nombre"></div>
      <div class="ff"><span class="fl">Cédula</span><input type="text" id="me-cedula" placeholder="ej: 5728223-5"></div>
      <div class="ff"><span class="fl">Rol</span><select id="me-rol"><option value="vendedor">Vendedor</option><option value="supervisor">Supervisor</option><option value="rrhh">RRHH</option></select></div>
      <div class="ff"><span class="fl">Fecha de ingreso</span><input type="date" id="me-ingreso"></div>
      <div class="ff"><span class="fl">Contrato</span><select id="me-contrato"><option value="indefinido">Indefinido</option><option value="temporal">Temporal</option><option value="pasante">Pasante</option></select></div>
      <div class="ff"><span class="fl">Estado</span><select id="me-estado"><option value="activo">Activo</option><option value="inactivo">Inactivo</option><option value="licencia">En licencia</option></select></div>
    </div>
    <div class="form-actions">
      <button class="btn" onclick="closeMo('mo-emp')">Cancelar</button>
      <button class="btn btn-a" onclick="guardarEmp()">Guardar</button>
    </div>
  </div>
</div>

<script type="module">

// NORMALIZACIÓN DE NOMBRES
function normNombre(n){
  if(!n) return '';
  return n.normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .toLowerCase().replace(/\s+/g,' ').trim()
    .split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
}
// Compara dos nombres ignorando tildes, mayúsculas y espacios extras
function matchNombre(a,b){
  const clean=s=>s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/\s+/g,' ').trim();
  return clean(a)===clean(b);
}

window.doLogin=async()=>{
  const u=document.getElementById('li-user').value.trim();

  document.getElementById('li-err').textContent='';
  if(!u||!p){document.getElementById('li-err').textContent='Completá usuario y contraseña.';return;}

function pgComisiones(el){
  const vm=ventasMes();
  const porEmp={};
  empleados.forEach(e=>{porEmp[e.nombre]={a:0,r:0,nf:cntFaltas(e.id)};});
  vm.forEach(v=>{if(!porEmp[v.vendedor])porEmp[v.vendedor]={a:0,r:0,nf:0};v.motivo==='Renovacion'?porEmp[v.vendedor].r++:porEmp[v.vendedor].a++;});
  const rows=Object.entries(porEmp).filter(([,d])=>d.a+d.r>0).map(([nombre,d])=>{
    const tv=d.a+d.r;
    let cond;
    if(tv<50)cond='ninguna';
    else if(tv>=80&&d.nf===0)cond='80';
    else cond='50';
    const ta=cond==='80'?175:cond==='50'?78:0;
    const tr=cond==='80'?100:cond==='50'?50:0;
    const est=d.a*ta+d.r*tr;
    return{nombre,tv,cond,est,nf:d.nf};
  });
  const totalEst=rows.reduce((a,r)=>a+r.est,0);
  el.innerHTML=`
    <div class="page-title">Comisiones</div>
    <div class="page-sub">Estimación — ${new Date().toLocaleDateString('es-UY',{month:'long',year:'numeric'})}</div>
    <div class="metrics m3">

      <div class="mc"><div class="mc-label">En tabla 80</div><div class="mc-value">${rows.filter(r=>r.cond==='80').length}</div><div class="mc-sub">vendedores</div></div>
      <div class="mc"><div class="mc-label">No cobran</div><div class="mc-value">${rows.filter(r=>r.cond==='ninguna').length}</div><div class="mc-sub">debajo de 50</div></div>
    </div>
    <div class="card">
      <div class="card-hdr"><span class="card-title">Detalle por vendedor</span><button class="btn btn-sm" onclick="nav('simulador')">Simulador exacto</button></div>
      ${rows.length===0?'<div class="empty">Sin ventas cargadas.</div>':
      `<div class="tw"><table><thead><tr><th>Vendedor</th><th>Ventas</th><th>Faltas</th><th>Tabla</th><th>Estimación*</th><th>Estado</th></tr></thead>
      <tbody>${rows.sort((a,b)=>b.est-a.est).map(r=>`<tr>
        <td>${r.nombre}</td>
        <td style="font-family:var(--mono)">${r.tv}</td>
        <td>${r.nf>0?`<span class="badge ${r.nf<=2?'ba':'br'}">${r.nf}</span>`:'<span class="badge bg">0</span>'}</td>
        <td><span class="badge ${r.cond==='80'?'bg':r.cond==='50'?'ba':'br'}">${r.cond==='80'?'Tabla 80':r.cond==='50'?'Tabla 50':'No cobra'}</span></td>
        <td style="font-family:var(--mono);font-weight:500">${r.cond!=='ninguna'?fmt$(r.est):'—'}</td>
        <td><span class="badge ba">Pendiente</span></td>
      </tr>`).join('')}</tbody></table></div>`}
    </div>
    <div style="font-size:11px;color:var(--text3)">* Estimación con tasa promedio. Usá el simulador para el cálculo exacto por plan.</div>`;
}

window.sAutoFill=()=>{
  const nombre=document.getElementById('sv').value;if(!nombre)return;
  const emp=empleados.find(e=>e.nombre===nombre);if(!emp)return;
  document.getElementById('sf-falta').value=cntFaltas(emp.id)>0?'si':'no';
  const vm=ventasMes().filter(v=>v.vendedor===nombre);
  PF.forEach(p=>{
    const ae=document.querySelector(`.sa[data-k="${p.k}"]`);
    const re=document.querySelector(`.sr[data-k="${p.k}"]`);
    if(ae)ae.value=0;if(re)re.value=0;
  });
  simF();
};

window.simF=()=>{
  let ta=0,tr=0;
  document.querySelectorAll('.sa').forEach(i=>ta+=parseInt(i.value)||0);
  document.querySelectorAll('.sr').forEach(i=>tr+=parseInt(i.value)||0);
  const tv=ta+tr;
  const falto=document.getElementById('sf-falta')?.value==='si';
  if(document.getElementById('s-a'))document.getElementById('s-a').textContent=ta;
  if(document.getElementById('s-r'))document.getElementById('s-r').textContent=tr;
  if(document.getElementById('s-t'))document.getElementById('s-t').textContent=tv;
  let cond;
  if(tv<50)cond='n';else if(tv>=80&&!falto)cond='80';else cond='50';
  const ce=document.getElementById('scond-f');if(!ce)return;
  if(cond==='n'){
    ce.innerHTML=`<div class="acond acr">No cobra<div style="font-size:11px;opacity:0.75;margin-top:2px">${tv} ventas — mínimo 50</div></div>`;
    document.getElementById('sres-f').innerHTML=`<div class="rtotal"><span>Total</span><span>$0.00</span></div>`;return;
  }
  ce.innerHTML=`<div class="acond ${cond==='80'?'acg':'aca'}">${cond==='80'?'Tabla 80 — sin faltas':'Tabla 50'}<div style="font-size:11px;opacity:0.75;margin-top:2px">${tv} ventas (${ta} altas + ${tr} renov.)${falto?', con faltas':''}</div></div>`;
  const ti=tr<=0?-1:tr<=200?0:tr<=250?1:2;
  let rows='',g=0;
  PF.forEach(p=>{
    const a=parseInt(document.querySelector(`.sa[data-k="${p.k}"]`)?.value)||0;
    const r=parseInt(document.querySelector(`.sr[data-k="${p.k}"]`)?.value)||0;
    if(a===0&&r===0)return;
    const tsa=cond==='80'?p.a8:p.a5;
    const tsr=ti>=0?(cond==='80'?p.r8[ti]:p.r5[ti]):null;
    const ma=a*tsa,mr=r>0&&tsr!==null?r*tsr:0;
    g+=ma+mr;
    let d=a>0?`${a}×${fmtN(tsa)}`:'';
    if(a>0&&r>0)d+=' + ';
    if(r>0)d+=tsr!==null?`${r}×${fmtN(tsr)}`:`<span class="no">sin tasa</span>`;
    d+=` = <strong style="font-family:var(--mono)">$${(ma+mr).toFixed(2)}</strong>`;
    rows+=`<div class="rrow"><span style="color:var(--text2)">${p.p}</span><span style="font-size:11px;text-align:right">${d}</span></div>`;
  });
  if(!rows)rows=`<div class="rrow"><span style="color:var(--text2)">Ingresá altas o renovaciones por plan</span></div>`;
  document.getElementById('sres-f').innerHTML=rows+`<div class="rtotal"><span>Total estimado</span><span style="font-family:var(--mono)">${fmt$(g)}</span></div>`;
};

window.simM=()=>{
  const v=parseInt(document.getElementById('mv-v')?.value)||0;
  const f=document.getElementById('mv-f')?.value==='si';
  let t;if(v<60)t='n';else if(v>=90&&!f)t='90';else t='60';
  const ce=document.getElementById('scond-m');if(!ce)return;
  if(t==='n'){
    ce.innerHTML=`<div class="acond acr">No cobra<div style="font-size:11px;opacity:0.75;margin-top:2px">${v} ventas — mínimo 60</div></div>`;
    document.getElementById('sres-m').innerHTML=`<div class="rtotal"><span>Total</span><span>$0.00</span></div>`;return;
  }
  ce.innerHTML=`<div class="acond ${t==='90'?'acg':'aca'}">${t==='90'?'Tramo 90 — sin faltas':'Tramo 60'}<div style="font-size:11px;opacity:0.75;margin-top:2px">${v} ventas${f?', con faltas (aplica tramo 60)':''}</div></div>`;
  const col=t==='90'?'c9':'c6';
  document.getElementById('sres-m').innerHTML=PM.map(p=>`<div class="rrow"><span style="color:var(--text2)">${p.p}</span><span style="font-family:var(--mono);font-weight:500">$${p[col]}</span></div>`).join('')+`<div class="rtotal"><span>Tramo</span><span class="badge ${t==='90'?'bg':'ba'}">${t} ventas</span></div>`;
};

window.qFalta=async(empId,delta)=>{
  if(delta===1){
    const r=await dbPush('faltas',{empleadoId:empId,fecha:today(),tipo:'injustificada',registrador:CU.role,obs:'Carga rápida'});
    faltas.push({id:r.key,empleadoId:empId,fecha:today(),tipo:'injustificada',registrador:CU.role,obs:'Carga rápida'});
  } else {
    const last=[...faltas].filter(f=>f.empleadoId===empId).pop();
    if(last){await dbDel('faltas/'+last.id);faltas=faltas.filter(f=>f.id!==last.id);}
  }
  rFaltasGrid();rFaltasHist();toast('Falta actualizada');
};

window.seedEmpleados=async()=>{
  const btn=document.querySelector('[onclick="seedEmpleados()"]');
  if(btn){btn.textContent='Cargando...';btn.disabled=true;}
  let agregados=0,omitidos=0;
  for(const e of EMPLEADOS_SEED){
    const nombre=e.nombre;
    const yaExiste=empleados.some(x=>matchNombre(x.nombre,nombre));
    if(yaExiste){omitidos++;continue;}
    const r=await dbPush('empleados',{nombre,cedula:e.cedula,rol:'vendedor',contrato:'indefinido',estado:'activo',ingreso:''});
    empleados.push({id:r.key,nombre,cedula:e.cedula,rol:'vendedor',contrato:'indefinido',estado:'activo',ingreso:''});
    agregados++;
  }
  if(btn){btn.textContent='Cargar listado base';btn.disabled=false;}
  const res=document.getElementById('seed-res');
  if(res) res.innerHTML=`<div class="cbox cg" style="margin-top:10px"><div class="cbox-title">Completado</div><div class="cbox-desc">${agregados} empleados agregados · ${omitidos} ya existían</div></div>`;

        <tr><td>FIBRA PREMIUM</td><td>Renovacion</td><td>María López</td></tr>
      </tbody></table></div>
      ${ventas.length>0?`<div style="margin-top:10px;font-size:11px;color:var(--text3)">${ventas.length} registros cargados en el mes actual.</div>`:''}
    </div>`;
}

async function procesarFilas(rows){
  let ok=0,skip=0,noMatch=0;
  const m=mes();
  const hdr=rows[0].map(h=>String(h||'').trim().toLowerCase());
  const pi=hdr.findIndex(h=>h.includes('plan'));
  const mi=hdr.findIndex(h=>h.includes('motivo'));
  const vi=hdr.findIndex(h=>h.includes('vendedor'));
  if(pi<0||mi<0||vi<0){
    document.getElementById('imp-res').innerHTML=`<div class="cbox cr"><div class="cbox-title">Error de formato</div><div class="cbox-desc">No se encontraron las columnas: Nuevo plan, Motivo de cambio de plan, Vendedor.</div></div>`;return;
  }
  for(let i=1;i<rows.length;i++){
    const c=rows[i];
    const plan=String(c[pi]||'').trim();
    const motivo=String(c[mi]||'').trim();
    const vendedorRaw=String(c[vi]||'').trim();
    if(!plan||!motivo||!vendedorRaw){skip++;continue;}
    if(/\bRN\b/i.test(vendedorRaw)){skip++;continue;}
    if(motivo==='Pasaje de tecnologia'){skip++;continue;}
    // Buscar coincidencia en legajos normalizando tildes/mayúsculas
    const empMatch=empleados.find(e=>matchNombre(e.nombre,vendedorRaw));
    const vendedor=empMatch?empMatch.nombre:normNombre(vendedorRaw);
    const r=await dbPush('ventas',{plan,motivo,vendedor,fecha:m+'-01'});
    ventas.push({id:r.key,plan,motivo,vendedor,fecha:m+'-01'});
    ok++;
  }
  document.getElementById('imp-res').innerHTML=`<div class="cbox cg"><div class="cbox-title">Importación completada</div><div class="cbox-desc">${ok} registros importados · ${skip} omitidos</div></div>`;
  toast(`${ok} ventas importadas`);
}

window.importArchivo=async input=>{
  const file=input.files[0];if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  document.getElementById('imp-res').innerHTML=`<div style="font-size:12px;color:var(--text2);padding:8px 0">Procesando archivo...</div>`;

  if(ext==='csv'){
    const text=await file.text();
    const lines=text.split('\n').filter(l=>l.trim());
    const rows=lines.map(l=>l.split(',').map(x=>x.trim().replace(/^"|"$/g,'')));
    await procesarFilas(rows);
  } else if(ext==='xlsx'||ext==='xls'){
    if(!window.XLSX){
      document.getElementById('imp-res').innerHTML=`<div class="cbox ca"><div class="cbox-title">Cargando librería...</div><div class="cbox-desc">Esperá un momento y volvé a intentar.</div></div>`;return;
    }
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    await procesarFilas(rows);
  } else {
    document.getElementById('imp-res').innerHTML=`<div class="cbox cr"><div class="cbox-title">Formato no soportado</div><div class="cbox-desc">Usá un archivo .csv o .xlsx</div></div>`;
  }
};

// ── TOAST ────────────────────────────────────────────
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
